<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Rekap Semua Pangkalan — i-Shipping</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    #rekap-table tbody tr:nth-child(even){ background:#f9fafb; }
    #rekap-table tbody tr:nth-child(odd){ background:#fff; }
    #rekap-table th, #rekap-table td { white-space:nowrap; }
    /* Tambahan efek transisi untuk tombol */
    button { transition: all 0.2s ease-in-out; }
    button:disabled { opacity: 0.6; cursor: not-allowed; }
  </style>
</head>
<body class="bg-blue-50 min-h-screen p-4 font-sans">
<div class="max-w-6xl mx-auto">

  <!-- Header -->
  <header class="flex items-center justify-between mb-4 bg-blue-200 p-3 rounded-lg shadow">
    <h1 class="text-xl font-bold text-blue-900">📊 Rekap Semua Pangkalan</h1>
    <button onclick="goDashboard()" class="px-3 py-1 bg-blue-600 text-white text-sm rounded-lg shadow hover:bg-blue-700">🏠 Dashboard</button>
  </header>

  <!-- Filter -->
  <section class="bg-white p-4 rounded-xl shadow mb-6">
    <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
      <div>
        <label class="block text-sm font-medium text-blue-900">Bulan</label>
        <select id="select-month" class="mt-1 block w-full rounded-md border-gray-300 p-2 border"></select>
      </div>
      <div>
        <label class="block text-sm font-medium text-blue-900">Tahun</label>
        <select id="select-year" class="mt-1 block w-full rounded-md border-gray-300 p-2 border"></select>
      </div>
    </div>
    <div class="mt-4 flex gap-2">
      <button id="btn-load" class="px-4 py-2 bg-blue-600 text-white rounded-lg shadow hover:bg-blue-700 flex items-center justify-center min-w-[160px]">
        🔎 Tampilkan Rekap
      </button>
      <button id="btn-export-csv" class="px-4 py-2 border border-blue-400 text-blue-700 rounded-lg shadow hover:bg-blue-50">
        📥 Export CSV
      </button>
    </div>
  </section>

  <!-- Table -->
  <section class="bg-white p-4 rounded-xl shadow" id="rekap-wrapper">
    <div class="overflow-auto max-h-[70vh]">
      <table id="rekap-table" class="min-w-full border border-gray-300 relative">
        <thead class="bg-blue-200 text-blue-900 font-bold sticky top-0 shadow">
          <tr>
            <th class="px-3 py-2 border">Nama Pangkalan</th>
            <th class="px-3 py-2 border">Nama PT</th>
            <th class="px-3 py-2 border">Penerimaan Bulan Ini</th>
            <th class="px-3 py-2 border">Total Pembayaran Brimola</th>
            <th class="px-3 py-2 border">Total Pembayaran di Luar Brimola</th>
            <th class="px-3 py-2 border">Total Pembayaran Bagi Hasil</th>
          </tr>
        </thead>
        <tbody id="rekap-body">
          <tr>
            <td colspan="6" class="text-center py-4 text-gray-500">Klik "Tampilkan Rekap" untuk memuat data.</td>
          </tr>
        </tbody>
        <tfoot class="bg-blue-100 font-semibold sticky bottom-0 shadow-sm border-t-2 border-blue-300">
          <tr>
            <td colspan="2" class="px-3 py-2 text-right border">TOTAL</td>
            <td id="sum-penerimaan" class="px-3 py-2 border text-right">0</td>
            <td id="sum-brimola" class="px-3 py-2 border text-right">0</td>
            <td id="sum-luar" class="px-3 py-2 border text-right">0</td>
            <td id="sum-bagihasil" class="px-3 py-2 border text-right">0</td>
          </tr>
        </tfoot>
      </table>
    </div>
  </section>
</div>

<script>
function goDashboard(){ window.location.href="dashboard.html"; }

function formatRupiah(val){
  if(!val || Number(val)===0) return '-';
  return 'Rp ' + Number(val).toLocaleString('id-ID');
}

const GAS_URL = "https://script.google.com/macros/s/AKfycbx0Mh35-fZ8iaSiWWIyAXA9wJnBH92f5_YcnlOl9oAC_NHyP7fadc1u2SaXJExsLtjRKg/exec";

function makeMonthOptions(){
  const sel=document.getElementById("select-month");
  const months=['Januari','Februari','Maret','April','Mei','Juni','Juli','Agustus','September','Oktober','November','Desember'];
  const now=new Date();
  let html = '';
  months.forEach((m,i)=>{
    const selected = (i === now.getMonth()) ? 'selected' : '';
    html += `<option value="${i+1}" ${selected}>${m}</option>`;
  });
  sel.innerHTML = html;
}

function makeYearOptions(){
  const sel=document.getElementById("select-year");
  const yearNow=new Date().getFullYear();
  let html = '';
  for(let y=yearNow-2; y<=yearNow+1; y++){
    const selected = (y === yearNow) ? 'selected' : '';
    html += `<option value="${y}" ${selected}>${y}</option>`;
  }
  sel.innerHTML = html;
}

async function fetchJSON(url){
  try{ 
    const res = await fetch(url); 
    return await res.json(); 
  } catch(e){ 
    console.error(e); 
    return null; 
  }
}

async function loadRekapAll(){
  const btn = document.getElementById("btn-load");
  const tbody = document.getElementById("rekap-body");
  
  // 1. UI Feedback: Matikan tombol dan tampilkan loading agar tidak diklik berkali-kali (mencegah lag)
  btn.disabled = true;
  btn.innerHTML = "⏳ Sedang Memuat...";
  tbody.innerHTML = `<tr><td colspan="6" class="text-center py-8 text-blue-600 font-semibold animate-pulse">Mengambil data dari server, mohon tunggu...</td></tr>`;

  const month = document.getElementById("select-month").value;
  const year = document.getElementById("select-year").value;
  const url = `${GAS_URL}?action=getRekapSemuaPangkalan&month=${month}&year=${year}`;
  
  // 2. Fetch Data
  const data = await fetchJSON(url);
  
  // 3. Kembalikan kondisi tombol
  btn.disabled = false;
  btn.innerHTML = "🔎 Tampilkan Rekap";

  if(!data) {
    tbody.innerHTML = `<tr><td colspan="6" class="text-center py-4 text-red-500">Gagal mengambil data. Silakan coba lagi.</td></tr>`;
    return;
  }
  
  renderTable(data.rows || []);
}

function renderTable(rows){
  const tbody = document.getElementById("rekap-body");
  let sumPenerimaan=0, sumBrimola=0, sumLuar=0, sumBagiHasil=0;
  
  if(rows.length === 0){
    tbody.innerHTML = `<tr><td colspan="6" class="text-center py-4 text-gray-500">Tidak ada data untuk bulan dan tahun tersebut.</td></tr>`;
    
    // Reset footer
    document.getElementById("sum-penerimaan").textContent = '-';
    document.getElementById("sum-brimola").textContent = '-';
    document.getElementById("sum-luar").textContent = '-';
    document.getElementById("sum-bagihasil").textContent = '-';
    return;
  }

  // Gunakan String HTML untuk performa yang jauh lebih cepat dibanding appendChild satu per satu
  let htmlRows = "";

  rows.forEach(r => {
    const p = Number(r.penerimaan) || 0;
    const b = Number(r.total_brimola) || 0;
    const l = Number(r.total_luar_brimola) || 0;
    const h = Number(r.total_bagi_hasil) || 0;

    sumPenerimaan += p;
    sumBrimola += b;
    sumLuar += l;
    sumBagiHasil += h;

    htmlRows += `
      <tr>
        <td class="px-3 py-2 border">${r.nama_pangkalan || '-'}</td>
        <td class="px-3 py-2 border">${r.nama_pt || '-'}</td>
        <td class="px-3 py-2 border text-right">${formatRupiah(p)}</td>
        <td class="px-3 py-2 border text-right">${formatRupiah(b)}</td>
        <td class="px-3 py-2 border text-right">${formatRupiah(l)}</td>
        <td class="px-3 py-2 border text-right">${formatRupiah(h)}</td>
      </tr>
    `;
  });

  // Render DOM sekaligus 1 kali
  tbody.innerHTML = htmlRows;

  document.getElementById("sum-penerimaan").textContent = formatRupiah(sumPenerimaan);
  document.getElementById("sum-brimola").textContent = formatRupiah(sumBrimola);
  document.getElementById("sum-luar").textContent = formatRupiah(sumLuar);
  document.getElementById("sum-bagihasil").textContent = formatRupiah(sumBagiHasil);
}

document.getElementById("btn-load").addEventListener("click", loadRekapAll);

document.getElementById("btn-export-csv").addEventListener("click", ()=>{
  const rows = Array.from(document.querySelectorAll("#rekap-table tr")).map(tr =>
    Array.from(tr.querySelectorAll("th,td")).map(td => `"${td.innerText.replace(/"/g, '""')}"`)
  );
  const csv = rows.map(r => r.join(",")).join("\n");
  const blob = new Blob([csv], {type:"text/csv;charset=utf-8;"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a"); 
  a.href = url; 
  a.download = "rekap_semua_pangkalan.csv"; 
  a.click();
  URL.revokeObjectURL(url);
});

// init
window.addEventListener("DOMContentLoaded",()=>{
  makeMonthOptions();
  makeYearOptions();
  // Menghapus loadRekapAll() otomatis di awal agar halaman terbuka instan. 
  // User harus klik tombol untuk me-load data.
});
</script>
</body>
</html>
